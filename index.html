<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Időjárás Kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="weather-card">
    <h2>Város kereső</h2>
    <div class="search-box">
        <div class="search-container">
            <input type="text" id="ghostInput" disabled>
            <input type="text" id="cityInput" placeholder="Írd be a várost..." autocomplete="off">
        </div>
        <button id="getWeather">Lekérés</button>
    </div>
    
    <div id="weatherResult">
        <p>Válassz egy várost!</p>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
